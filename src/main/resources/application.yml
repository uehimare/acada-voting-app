spring:
  application:
    name: naijavote

  datasource:
    url: jdbc:postgresql://postgres:5432/naijavote
    username: naijavote_user
    password: naijavote_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false
    encoding: UTF-8

  security:
    user:
      name: admin
      password: temporary

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.naijavote: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
