<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NaijaVote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">🇳🇬 NaijaVote</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/my-vote">My Vote</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/parties">
                            <i class="fas fa-cog"></i> Admin Panel
                        </a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="POST" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row mb-4">
            <div class="col-md-12">
                <h1 class="mb-2">Welcome, <span th:text="${user.username}"></span>! 🗳️</h1>
                <p class="text-muted">Cast your vote for your preferred Nigerian political party</p>
            </div>
        </div>

        <!-- Success Message -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>Success!</strong> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Current Vote Info -->
        <div th:if="${userVote}" class="alert alert-info mb-4">
            <strong>Your Vote is Final:</strong> You have voted for <span th:text="${userVote.party.name}"></span> (<span th:text="${userVote.party.abbreviation}"></span>). Your vote cannot be changed.
        </div>

        <!-- Parties Grid -->
        <div class="row">
            <div th:each="party : ${parties}" class="col-md-6 col-lg-4 mb-4">
                <div class="card h-100 shadow-sm party-card" th:classappend="${userVote != null and userVote.party.id == party.id} ? 'border-success border-3' : ''">
                    <div class="card-body">
                        <h3 class="card-title" th:text="${party.name}"></h3>
                        <p class="text-muted small" th:text="'Abbreviation: ' + ${party.abbreviation}"></p>
                        <p class="card-text" th:text="${party.description}"></p>
                    </div>
                    <div class="card-footer bg-white">
                        <form method="POST" th:action="@{/vote/{partyId}(partyId=${party.id})}" class="d-inline">
                            <button type="submit" class="btn btn-primary w-100" th:disabled="${userVote != null}">
                                <span th:if="${userVote != null and userVote.party.id == party.id}">✓ My Vote (Final)</span>
                                <span th:if="${userVote == null}">Vote for <span th:text="${party.abbreviation}"></span></span>
                                <span th:if="${userVote != null and userVote.party.id != party.id}">Already Voted</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center text-muted">
            <p>&copy; 2024 NaijaVote. Your voice, your choice! 🗳️</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
