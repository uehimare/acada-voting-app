<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Parties - NaijaVote Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">🇳🇬 NaijaVote Admin</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/parties">Manage Parties</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics">Statistics</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="POST" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <h1 class="mb-2">Manage Political Parties</h1>
                <p class="text-muted">Create, edit, and manage Nigerian political parties</p>
            </div>
        </div>

        <!-- Error & Success Messages -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Create Party Form -->
        <div class="card shadow-sm mb-5">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Create New Party</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="/admin/parties" th:object="${partyRequest}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Party Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="abbreviation" class="form-label">Abbreviation</label>
                            <input type="text" class="form-control" id="abbreviation" th:field="*{abbreviation}" required maxlength="10">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Party</button>
                </form>
            </div>
        </div>

        <!-- Parties List -->
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Political Parties (<span th:text="${parties.size()}"></span>)</h3>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Abbreviation</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="party : ${parties}">
                            <td th:text="${party.name}" class="fw-bold"></td>
                            <td th:text="${party.abbreviation}" class="text-primary"></td>
                            <td th:text="${party.description}"></td>
                            <td>
                                <a th:href="@{/admin/voters/{partyId}(partyId=${party.id})}" class="btn btn-sm btn-info">
                                    View Voters
                                </a>
                                <form method="POST" th:action="@{/admin/parties/{id}/delete(id=${party.id})}" class="d-inline" onsubmit="return confirm('Are you sure?');">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${parties.isEmpty()}">
                            <td colspan="4" class="text-center py-4">No parties found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center text-muted">
            <p>&copy; 2024 NaijaVote. Admin Panel</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
