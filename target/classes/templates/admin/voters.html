<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voters for Party - NaijaVote Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">🇳🇬 NaijaVote Admin</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/parties">Manage Parties</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/statistics">Statistics</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="POST" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <h1 class="mb-2">Voters for <span th:text="${party.name}"></span></h1>
                <p class="text-muted">Total Votes: <strong th:text="${voteCount}"></strong></p>
            </div>
            <div class="col-md-4 text-end">
                <a href="/admin/parties" class="btn btn-outline-primary">← Back to Parties</a>
            </div>
        </div>

        <!-- Voters Table -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Voted At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="vote : ${votes}">
                        <td th:text="${vote.user.username}"></td>
                        <td th:text="${vote.user.email}"></td>
                        <td th:text="${#temporals.format(vote.votedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td>
                            <a href="#" class="btn btn-sm btn-info">View</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty State -->
        <div th:if="${votes.isEmpty()}" class="alert alert-info" role="alert">
            <strong>No votes yet!</strong> This party hasn't received any votes.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
