name: Build and Push to DockR

on:
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - 
        name: checkout repo
        uses: actions/checkout@v6
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: uehimare/naijavote-main:latest
Deploy-2-ec2:
  runs-on: ubuntu-latest
  needs: build-image
  steps:
      -
        name: checkout repo
        uses: actions/checkout@v6
      
      - name: Build env
        run: |
          echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
          echo "POSTGRES_USER=$POSTGRES_USER" >> .env
          echo "SPRING_DATASOURCE_USERNAME=$POSTGRES_USER" >> .env
          echo "SPRING_DATASOURCE_PASSWORD=$POSTGRES_PASSWORD" >> .env
      
      - name: Copy artifact to ec2 instance
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.EC2HOST }}
          username: ${{ secrets.EC2USERNAME }}
          key: ${{ secrets.EC2KEY }}
          source: "*"
          target: ~/acada-vote-app 
          rm: true 