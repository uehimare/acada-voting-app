services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: naijavote-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - naijavote_network

  # Spring Boot Application
  naijavote-app:
    image: kniru/naijavote-main:latest
    container_name: naijavote-app
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      LOGGING_LEVEL_COM_NAIJAVOTE: ${LOGGING_LEVEL_COM_NAIJAVOTE}
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - naijavote_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  naijavote_network:
    driver: bridge
